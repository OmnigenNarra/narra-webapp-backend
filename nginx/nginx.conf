user  nginx;
worker_processes  auto;
pid  /var/run/nginx.pid;
error_log  /dev/stderr warn;


events {
	worker_connections  2048;
	multi_accept  on;
}


http {
	directio  1m;
	sendfile  off;
	tcp_nopush  on;
	tcp_nodelay  on;
	keepalive_timeout  65;
	types_hash_max_size  2048;

	# server_names_hash_bucket_size 64;
	# server_name_in_redirect off;

	include  /etc/nginx/mime.types;
	default_type  application/octet-stream;

	ssl_protocols  TLSv1  TLSv1.1  TLSv1.2;
	ssl_prefer_server_ciphers  on;

	# hardening -->

	# https://calomel.org/nginx.html

	server_tokens  off;

	client_body_buffer_size  10m;
	client_header_buffer_size  8k;
	client_max_body_size  50m;
	large_client_header_buffers  8  4k;

	connection_pool_size  256;
	request_pool_size  8k;

	output_buffers  1  32k;
	postpone_output 1460;

	client_body_timeout  10;
	client_header_timeout  10;
	send_timeout  10;

	ignore_invalid_headers  on;
	keepalive_disable  none;
	max_ranges  1;

	msie_padding  off;
	open_file_cache  max=1000 inactive=2h;
	open_file_cache_errors  on;
	open_file_cache_min_uses  1;
	open_file_cache_valid  1h;

	read_ahead  512K;
	recursive_error_pages  on;
	reset_timedout_connection  on;
	server_name_in_redirect  off;

	# limit_conn_zone $binary_remote_addr zone=addr:10m;

	# <-- hardening

	# http_logging -->

	log_format timed_combined '$remote_addr - $remote_user [$time_iso8601] '
		'"$request" $status $request_length/$body_bytes_sent '
		'$upstream_connect_time/$upstream_header_time/$upstream_response_time/$request_time '
		'$gzip_ratio $pipe $connection_requests '
		'"$http_referer" "$http_user_agent" "$http_x_forwarded_for"';

	# <-- http_logging

	access_log  /dev/stdout  timed_combined;

	gzip  on;
	gzip_disable  "msie6";
	gzip_static  on;

	# gzip_vary on;
	# gzip_proxied any;
	# gzip_comp_level 6;
	# gzip_buffers 16 8k;
	# gzip_http_version 1.1;
	gzip_types  text/plain  text/css  application/json  application/javascript
		text/xml  application/xml  application/xml+rss  text/javascript;

	include  /etc/nginx/conf.d/*.conf;
}
